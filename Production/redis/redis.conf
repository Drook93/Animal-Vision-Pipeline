# This lets Redis accept connections from other containers in my Docker network, not just localhost
bind 0.0.0.0
# This is the default Redis port, Airflow expects this
port 6379
# This disables the protection that blocks external connections, needed in Docker
protected-mode no
# This caps how much memory Redis can use
maxmemory 256mb
# This is the cache behaviour you saw in the docs, it evicts the least recently used keys when memory is full
maxmemory-policy allkeys-lru
# This persists data to disk so you don't lose everything if the container restarts
appendonly yes
